<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Gig Reflex Pro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-header">
      <span>GIG REFLEX PRO</span>
      <span class="icon-btn" onclick="toggleAnalytics()">📈</span>
    </div>

    <div id="analytics-page">
      <div class="analytics-header">
        <h2 style="margin: 0">Analytics</h2>
        <span class="icon-btn" onclick="toggleAnalytics()">✕</span>
      </div>

      <div class="stat-card">
        <h3>Personal Best (Reaction)</h3>
        <div id="pb-val" class="val">0 ms</div>
      </div>

      <div class="stat-card">
        <h3>Success Rate</h3>
        <div id="success-rate" class="val">0%</div>
      </div>

      <div class="stat-card">
        <h3>Last 10 Attempts (ms)</h3>
        <div id="graph" class="graph-container"></div>
      </div>

      <button class="btn reset-btn" onclick="clearStats()">RESET DATA</button>
    </div>

    <div class="stats-bar">
      <div><b>SCAN</b><span id="s-ms">0</span>ms</div>
      <div><b>REACT</b><span id="r-ms">0</span>ms</div>
      <div><b>ACTION</b><span id="a-ms">0</span>ms</div>
    </div>

    <div class="container">
      <div id="target-card" class="training-card">
        <h2>NEW OPPORTUNITY</h2>
        <p>Station: ALPHA-1</p>
        <div class="price-tag">$72.00</div>
      </div>
      <div id="coach-feedback"></div>
    </div>

    <div class="footer">
      <button id="main-action" class="btn primary-btn">REFRESH SCAN</button>
      <button id="confirm-action" class="btn success-btn">
        CONFIRM ACTION
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
