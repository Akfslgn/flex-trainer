<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Gig Reflex Pro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-header">
      <span>GIG REFLEX PRO</span>
      <span class="icon-btn" onclick="toggleAnalytics()">📈</span>
    </div>

    <div id="analytics-page">
      <div class="analytics-header">
        <h2 style="margin: 0">Performance</h2>
        <span class="icon-btn" onclick="toggleAnalytics()">✕</span>
      </div>
      <div class="stat-card">
        <h3>Personal Best</h3>
        <div id="pb-val" class="val">0 ms</div>
      </div>
      <div class="stat-card">
        <h3>Success Rate</h3>
        <div id="success-rate" class="val">0%</div>
      </div>
      <div class="stat-card">
        <h3>History</h3>
        <div id="graph" class="graph-container"></div>
      </div>
      <button class="btn reset-btn" onclick="clearStats()">RESET DATA</button>
    </div>

    <div class="stats-bar">
      <div><b>SCAN</b><span id="s-ms">0</span>ms</div>
      <div><b>REACT</b><span id="r-ms">0</span>ms</div>
      <div><b>ACTION</b><span id="a-ms">0</span>ms</div>
    </div>

    <div class="container">
      <div id="status-msg" class="status-text">Scanning...</div>

      <div id="target-card" class="compact-card">
        <div class="card-left">
          <h3>Station Alpha-1</h3>
          <p>Today • 3.5 hr • $72.00</p>
        </div>
        <div class="card-right">
          <span class="price-val">$72.00</span>
          <span class="arrow-icon">›</span>
        </div>
      </div>

      <div id="detail-page" class="detail-overlay">
        <div class="detail-content">
          <h1 style="margin: 0 0 15px 0">Offer Details</h1>
          <div class="detail-block">
            <b>ALPHA-1 HUB</b>
            <hr style="border: 0; border-top: 1px solid #333; margin: 10px 0" />
            <p style="margin: 5px 0; color: #aaa">Today, 3:30 PM</p>
            <p style="margin: 5px 0; color: #aaa">3.5 hours</p>
            <b style="font-size: 20px; color: var(--success)">$72.00</b>
          </div>
        </div>
      </div>

      <div id="coach-feedback"></div>
    </div>

    <div class="footer">
      <button id="main-action" class="btn primary-btn">REFRESH SCAN</button>
      <button id="decline-action" class="btn secondary-btn">DECLINE</button>
      <button id="confirm-action" class="btn success-btn">
        CONFIRM ACTION
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
